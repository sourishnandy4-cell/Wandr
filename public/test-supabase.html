<!DOCTYPE html>
<html>
<head>
    <title>Supabase Connection Test</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f5f5f5; }
        .result { padding: 20px; margin: 20px 0; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { background: #fff; padding: 15px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <div id="result">Testing...</div>
    
    <script type="module">
        const result = document.getElementById('result');
        
        // Check if environment variables are loaded
        const supabaseUrl = import.meta.env.VITE_SUPABASE_URL;
        const supabaseKey = import.meta.env.VITE_SUPABASE_ANON_KEY;
        
        let html = '<h2>Configuration Check:</h2>';
        
        if (!supabaseUrl || !supabaseKey) {
            html += '<div class="result error">';
            html += '<h3>❌ Supabase NOT Configured</h3>';
            html += '<p>Environment variables are missing:</p>';
            html += '<pre>';
            html += 'VITE_SUPABASE_URL: ' + (supabaseUrl || 'NOT SET') + '\n';
            html += 'VITE_SUPABASE_ANON_KEY: ' + (supabaseKey ? 'SET (hidden)' : 'NOT SET');
            html += '</pre>';
            html += '<p><strong>This means the app is running in MOCK MODE (localStorage)</strong></p>';
            html += '</div>';
        } else {
            html += '<div class="result success">';
            html += '<h3>✅ Supabase IS Configured</h3>';
            html += '<pre>';
            html += 'VITE_SUPABASE_URL: ' + supabaseUrl + '\n';
            html += 'VITE_SUPABASE_ANON_KEY: ' + supabaseKey.substring(0, 20) + '...';
            html += '</pre>';
            html += '</div>';
            
            // Try to connect
            html += '<h2>Connection Test:</h2>';
            html += '<div class="result">Testing connection...</div>';
        }
        
        result.innerHTML = html;
    </script>
</body>
</html>
